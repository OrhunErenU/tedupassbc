packages:
  - "apps/*"
  - "packages/*"
  - "contracts"

# pnpm 10 ignores dependency build scripts by default. Allow Prisma's so the
# native query engine downloads during install (needed by Vercel serverless).
onlyBuiltDependencies:
  - "@prisma/client"
  - "@prisma/engines"
  - "prisma"
  - "esbuild"
